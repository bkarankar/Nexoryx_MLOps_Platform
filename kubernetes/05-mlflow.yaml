apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: nexoryx-mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:v2.12.1
        args:
        - mlflow
        - server
        - --host=0.0.0.0
        - --backend-store-uri=postgresql://mlopsuser:CHANGE_ME@postgres:5432/mlops
        - --default-artifact-root=s3://mlflow/
        env:
        - name: MLFLOW_S3_ENDPOINT_URL
          value: http://minio:9000
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: nexoryx-mlops
spec:
  selector:
    app: mlflow
  ports:
  - port: 5000
