apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: nexoryx-mlops
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: minio/minio
        args:
        - server
        - /data
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: mlops-secrets
              key: MINIO_ROOT_USER
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mlops-secrets
              key: MINIO_ROOT_PASSWORD
        ports:
        - containerPort: 9000
        volumeMounts:
        - mountPath: /data
          name: minio-storage
  volumeClaimTemplates:
  - metadata:
      name: minio-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: nexoryx-mlops
spec:
  selector:
    app: minio
  ports:
  - port: 9000
