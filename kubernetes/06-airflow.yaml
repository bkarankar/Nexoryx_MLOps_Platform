apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: nexoryx-mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      containers:
      - name: airflow
        image: apache/airflow:3.0.2
        env:
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          value: postgresql+psycopg2://mlopsuser:CHANGE_ME@postgres:5432/mlops
        - name: AIRFLOW__CORE__EXECUTOR
          value: LocalExecutor
        ports:
        - containerPort: 8080
        command: ["airflow", "api-server"]
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: nexoryx-mlops
spec:
  selector:
    app: airflow-webserver
  ports:
  - port: 8080
